name: Validate site

# Catches broken links and missing image/asset paths automatically on every push.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links & local asset paths
        uses: lycheeverse/lychee-action@v2
        with:
          # Verify internal anchors/assets; skip the not-yet-live placeholder
          # canonical domain, GitHub Pages host, and common social/search hosts.
          args: >-
            --no-progress
            --include-fragments
            --exclude-path images
            --exclude "ajsdiamonddetailing\.com"
            --exclude "caiomsi\.github\.io"
            --exclude "facebook\.com|instagram\.com|google\.com|yelp\.com"
            index.html
          fail: true
